<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#e94560" />

    <!-- ── Primary SEO ── -->
    <title>ClassyShop — Pakistan's Big Mega Store | Fashion, Electronics, Beauty & More</title>
    <meta name="description" content="ClassyShop is Pakistan's premier online mega store. Shop the latest Fashion, Electronics, Bags, Footwear, Beauty, Wellness, Jewellery & Groceries with fast delivery and unbeatable prices." />
    <meta name="keywords" content="online shopping Pakistan, ClassyShop, fashion online, electronics Pakistan, bags, footwear, beauty products, wellness, jewellery, groceries, mega store, buy online, free delivery Pakistan" />
    <meta name="author" content="ClassyShop" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <link rel="canonical" href="https://classyshop.pk/" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ClassyShop" />
    <meta property="og:title" content="ClassyShop — Pakistan's Big Mega Store" />
    <meta property="og:description" content="Pakistan's premier online mega store for Fashion, Electronics, Bags, Footwear, Beauty, Wellness, Jewellery & Groceries." />
    <meta property="og:url" content="https://classyshop.pk/" />
    <meta property="og:image" content="https://classyshop.pk/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_PK" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ClassyShopPK" />
    <meta name="twitter:title" content="ClassyShop — Pakistan's Big Mega Store" />
    <meta name="twitter:description" content="Pakistan's premier online mega store for Fashion, Electronics, Bags, Footwear, Beauty, Wellness, Jewellery & Groceries." />
    <meta name="twitter:image" content="https://classyshop.pk/og-image.jpg" />

    <!-- ── Geo / Regional ── -->
    <meta name="geo.region" content="PK" />
    <meta name="geo.country" content="Pakistan" />
    <meta name="language" content="English" />
    <meta name="distribution" content="global" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="3 days" />

    <!-- ── PWA / App ── -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />

    <!-- ── JSON-LD: Organization ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ClassyShop",
      "alternateName": "ClassyShop Big Mega Store",
      "url": "https://classyshop.pk",
      "logo": "https://classyshop.pk/logo192.png",
      "description": "Pakistan's premier online mega store for Fashion, Electronics, Bags, Footwear, Beauty, Wellness, Jewellery and Groceries.",
      "foundingDate": "2024",
      "areaServed": "PK",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Service",
        "availableLanguage": ["English", "Urdu"]
      },
      "sameAs": [
        "https://www.facebook.com/classyshoppe",
        "https://www.instagram.com/classyshoppe",
        "https://twitter.com/ClassyShopPK"
      ]
    }
    </script>

    <!-- ── JSON-LD: WebSite + SearchAction ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ClassyShop",
      "url": "https://classyshop.pk",
      "description": "Pakistan's Big Mega Store — Fashion, Electronics, Bags, Footwear, Beauty, Wellness, Jewellery & Groceries",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://classyshop.pk/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ── JSON-LD: Online Store ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "ClassyShop",
      "image": "https://classyshop.pk/og-image.jpg",
      "url": "https://classyshop.pk",
      "description": "Online mega store offering Fashion, Electronics, Bags, Footwear, Groceries, Beauty, Wellness and Jewellery at the best prices in Pakistan.",
      "priceRange": "Rs.100 - Rs.1,000,000",
      "currenciesAccepted": "PKR",
      "paymentAccepted": "Cash, Credit Card, Debit Card, Online Transfer",
      "hasMap": "https://classyshop.pk",
      "areaServed": {
        "@type": "Country",
        "name": "Pakistan"
      }
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
